services:
  n8n:
    image: n8nio/n8n:1.121.3
    container_name: n8n
    restart: unless-stopped

    environment:
      - N8N_HOST=n8n.clinicflow.dev
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.clinicflow.dev/
      - GENERIC_TIMEZONE=America/Lima

      # ✅ Limpieza automática de ejecuciones (10 días = 240 horas)
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=240
      - N8N_AI_TIMEOUT_MAX=900000

    ports:
      - "5678:5678"

    volumes:
      - /root/n8n:/home/node/.n8n

    networks:
      - web

  gotenberg:
    image: gotenberg/gotenberg:8
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - web

networks:
  web:
    external: true
    name: pdf2img_web
